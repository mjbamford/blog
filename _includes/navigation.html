
<nav>
  <ul>
    {% comment %}
    {% for page in site.pages %}
    <li><a href="{{ page.url | relative_url }}">{{ page.title }}</a></li>
    {% endfor %}
    {% endcomment %}
    {% for item in site.data.navigation %}
    <li>
      <a href="{{ item.link }}" {% if page.url == item.link %}class="text-red-500"{% endif %}>
        {{ item.name }}
      </a>
    </li>
    {% endfor %}
  </ul>
</nav>
